<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SlowPan — Ken Burns Slideshow</title>
<!--
  SlowPan — a theme-agnostic animated background scene for OBS (Browser Source).

  Point it at a folder of images and it plays them full-screen with a slow,
  randomized documentary-style zoom-and-pan plus crossfades — the "Ken Burns
  effect". Collections are sub-folders of the media directory; a per-source
  ?collection=<name> URL parameter overrides the default so two scenes can show
  different image sets.

  Transport (how the overlay gets its image list + settings):
    • ?transport=node    → panel-core.js  (the bundled Node server, same-origin WS)
    • ?transport=sb      → panel-client-sb.js  (Streamer.bot's WebSocket server)
    • no param           → auto-detect: the bundled server serves this page from
      its root (http://host/kenburns-slideshow.html), so a root-level http(s)
      path means Node; anything else (Streamer.bot's /slowpan-overlay/ mapping,
      or a file:// load where a same-origin WS is impossible) means Streamer.bot.
  Both re-emit the same `svc:message` events, so the render logic below is
  identical either way.
-->
<script>window.__PANEL_TYPE = 'kenburns';</script>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }
  #stage {
    position: absolute;
    inset: 0;
    overflow: hidden;
    background: #000;
  }
  .kb-layer {
    position: absolute;
    inset: 0;
    opacity: 0;
    /* Crossfade duration is set live via --fade. */
    transition: opacity var(--fade, 1500ms) ease-in-out;
    will-change: opacity;
  }
  .kb-layer.visible {
    opacity: 1;
  }
  .kb-layer img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform-origin: center center;
    will-change: transform;
  }
  #hint {
    display: none;
    position: absolute;
    inset: 0;
    place-content: center;
    text-align: center;
    padding: 2em;
    color: #9aa4b2;
    font: 15px/1.6 system-ui, sans-serif;
    white-space: pre-line;
  }
  #hint.show { display: grid; }
  #hint code { color: #e2e8f0; font-size: 1.05em; }
</style>
</head>
<body>
  <div id="stage">
    <div class="kb-layer" id="layerA"><img alt=""></div>
    <div class="kb-layer" id="layerB"><img alt=""></div>
  </div>
  <div id="hint"></div>

  <!-- Transport loader — ?transport=node|sb forces one; otherwise auto-detect (see header). -->
  <script>
  (function () {
    var t = new URLSearchParams(location.search).get('transport');
    if (t !== 'sb' && t !== 'node') {
      // Only the bundled Node server serves this page at its root over http(s);
      // any other origin/path can't reach a same-origin WS, so use Streamer.bot.
      var nodeOrigin = /^https?:$/.test(location.protocol) && /^\/[^/]*$/.test(location.pathname);
      t = nodeOrigin ? 'node' : 'sb';
    }
    var src = (t === 'sb') ? 'panel-client-sb.js' : 'panel-core.js';
    document.write('<scr' + 'ipt src="' + src + '"><\/scr' + 'ipt>');
  })();
  </script>
  <script>
  (function () {
    'use strict';

    const stage = document.getElementById('stage');
    const layers = [document.getElementById('layerA'), document.getElementById('layerB')];

    // ── Runtime config (overwritten by every kenburns payload) ──────────────
    let cfg = {
      collection: 'sample',
      durationMs: 8000,
      transitionMs: 1500,
      zoomMin: 1.0,
      zoomMax: 1.25,
      order: 'random',
    };
    let manifests = {};         // { collection: [image urls] }
    const urlOverride = new URLSearchParams(location.search).get('collection');

    // ── Playback state ──────────────────────────────────────────────────────
    let playlist = [];
    let playIndex = 0;
    let activeLayer = 0;
    let advanceTimer = null;
    let runToken = 0;

    // ── Helpers ───────────────────────────────────────────────────────────
    function rand(min, max) { return min + Math.random() * (max - min); }

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function currentCollection() {
      // Per-source override wins, but only if that collection actually exists.
      if (urlOverride && manifests[urlOverride]) return urlOverride;
      return cfg.collection;
    }

    function currentImages() {
      return manifests[currentCollection()] || [];
    }

    function buildPlaylist() {
      const imgs = currentImages();
      playlist = cfg.order === 'sequential' ? imgs.slice() : shuffle(imgs);
      playIndex = 0;
    }

    // ── Ken Burns motion ────────────────────────────────────────────────────
    function kenBurns(imgEl, durationMs) {
      const zMin = cfg.zoomMin;
      const zMax = Math.max(zMin, cfg.zoomMax);
      const s0 = rand(zMin, zMax);
      const s1 = rand(zMin, zMax);

      const panFor = (s) => Math.max(0, (s - 1) / 2) * 100;
      const p0 = panFor(s0);
      const p1 = panFor(s1);
      const tx0 = rand(-p0, p0), ty0 = rand(-p0, p0);
      const tx1 = rand(-p1, p1), ty1 = rand(-p1, p1);

      return imgEl.animate(
        [
          { transform: `scale(${s0}) translate(${tx0}%, ${ty0}%)` },
          { transform: `scale(${s1}) translate(${tx1}%, ${ty1}%)` },
        ],
        { duration: durationMs, easing: 'ease-out', fill: 'forwards' },
      );
    }

    // ── Slide loop ──────────────────────────────────────────────────────────
    function showNext(token) {
      if (token !== runToken) return;
      if (playlist.length === 0) return;

      const url = playlist[playIndex];
      const nextLayer = 1 - activeLayer;
      const layerEl = layers[nextLayer];
      const imgEl = layerEl.querySelector('img');

      layerEl.style.setProperty('--fade', cfg.transitionMs + 'ms');

      const begin = () => {
        if (token !== runToken) return;
        try { imgEl.getAnimations().forEach((a) => a.cancel()); } catch {}
        kenBurns(imgEl, cfg.durationMs + cfg.transitionMs);

        layerEl.classList.add('visible');
        layers[activeLayer].classList.remove('visible');
        activeLayer = nextLayer;

        playIndex++;
        if (playIndex >= playlist.length) {
          buildPlaylist();
        }

        advanceTimer = setTimeout(() => showNext(token), cfg.durationMs);
      };

      if (imgEl.src === url && imgEl.complete) {
        begin();
      } else {
        imgEl.onload = () => { imgEl.onload = null; begin(); };
        imgEl.onerror = () => {
          imgEl.onerror = null;
          if (token !== runToken) return;
          playIndex++;
          if (playIndex >= playlist.length) buildPlaylist();
          showNext(token);
        };
        imgEl.src = url;
      }
    }

    function restart() {
      runToken++;
      const token = runToken;
      if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }

      buildPlaylist();

      if (playlist.length === 0) {
        layers.forEach((l) => l.classList.remove('visible'));
        showHint();
        return;
      }
      hideHint();
      showNext(token);
    }

    // ── Empty-state hint — explains WHY the screen is black ─────────────────
    function showHint() {
      const hint = document.getElementById('hint');
      const names = Object.keys(manifests).filter((n) => (manifests[n] || []).length);
      const list = names.length
        ? 'Available collections: ' + names.map((n) => `“${n}”`).join(', ')
        : 'No image collections were found — add a sub-folder of images to the media directory.';
      let msg;
      if (urlOverride && !manifests[urlOverride]) {
        msg = `Collection “${urlOverride}” doesn't exist.\n${list}`;
      } else if (!urlOverride) {
        msg = `No collection selected — add ?collection=<name> to this URL\n(e.g. ${location.pathname}?collection=${names[0] || 'sample'}), or set a default in the control panel / push action.\n${list}`;
      } else {
        msg = `Collection “${urlOverride}” has no images.\n${list}`;
      }
      hint.innerHTML = '';
      hint.textContent = msg;
      hint.classList.add('show');
    }
    function hideHint() {
      document.getElementById('hint').classList.remove('show');
    }

    // ── Payload intake ──────────────────────────────────────────────────────
    function applyKenburns(kb) {
      if (!kb || typeof kb !== 'object') return;
      if (kb.config && typeof kb.config === 'object') {
        cfg = { ...cfg, ...kb.config };
      }
      manifests = (kb.manifests && typeof kb.manifests === 'object') ? kb.manifests : {};
      restart();
    }

    window.addEventListener('svc:message', (e) => {
      const msg = e.detail;
      if (!msg) return;
      if (msg.type === 'sync') {
        if (msg.kenburns) applyKenburns(msg.kenburns);
      } else if (msg.type === 'kenburns:update') {
        applyKenburns(msg.kenburns);
      }
    });
  })();
  </script>
</body>
</html>
